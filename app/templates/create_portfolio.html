{% extends "base.html" %}

{% block title %}Create Portfolio{% endblock %}

{% block body %}
<div class="page-header">
    <h1>Create New Portfolio</h1>
</div>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-6">
            <form method="POST" action="{{ url_for('portfolio_bp.create_portfolio') }}">
                <div class="mb-3">
                    <label for="portfolio_name" class="form-label">Portfolio Name *</label>
                    <input type="text" class="form-control" id="portfolio_name" name="portfolio_name" 
                           placeholder="Enter portfolio name (e.g., Growth Portfolio)" required>
                    <small class="form-text text-muted">This will be the name of the CSV file created in the data directory.</small>
                </div>

                <div class="mb-3">
                    <label for="currency" class="form-label">Currency *</label>
                    <select class="form-select" id="currency" name="currency" required>
                        <option value="">-- Select Currency --</option>
                        <option value="USD">USD - US Dollar</option>
                        <option value="SGD">SGD - Singapore Dollar</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="GBP">GBP - British Pound</option>
                        <option value="JPY">JPY - Japanese Yen</option>
                        <option value="AUD">AUD - Australian Dollar</option>
                        <option value="CAD">CAD - Canadian Dollar</option>
                        <option value="CHF">CHF - Swiss Franc</option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Create Portfolio</button>
                    <a href="{{ url_for('portfolio_bp.portfolio') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
